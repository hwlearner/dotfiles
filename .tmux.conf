# ==============================================================================
# Prefix
# ==============================================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ==============================================================================
# General
# ==============================================================================
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g history-limit 10000
set -g mouse on
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ==============================================================================
# Plugins (TPM)
# ==============================================================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# ==============================================================================
# Catppuccin
# ==============================================================================
set -g @catppuccin_flavor "mocha"

# ==============================================================================
# Key Bindings
# ==============================================================================
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ==============================================================================
# Initialize TPM (keep this at the very bottom)
# ==============================================================================
run '~/.tmux/plugins/tpm/tpm'

# ==============================================================================
# Status Bar — Your dotfiles style (after run)
# ==============================================================================
set -g status-position bottom
set -g status-justify centre
set -g status-bg default
set -g status-left ""
set -g status-right ""

# Window indicators: ● current, ○ others (transparent background)
set -g status-style "bg=default,fg=#cdd6f4"
set -g window-status-style "bg=default,fg=colour245"
set -g window-status-current-style "bg=default,fg=colour75"
set -g window-status-current-format "#[bg=default]● #W "
set -g window-status-format "#[bg=default]○ #W "
